<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arduino Oscilloscope</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- JS -->
  <script src="script.js" defer></script>
</head>

<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1 class="title">Arduino Oscilloscope</h1>
    <div class="serial-bar">
      <div id="no-serial-warn" class="no-serial">⚠ Web Serial non supportata — usa Chrome o Edge.</div>
      <select id="baud-sel" class="baud-sel">
        <option value="9600" selected>9600</option>
        <option value="57600">57600</option>
        <option value="115200">115200</option>
      </select>
      <button class="conn-btn" id="conn-btn">🔌 Connect Serial</button>
      <span class="conn-status" id="conn-status">● disconnected</span>
    </div>
  </div>

  <div class="main">

    <div class="col-left">

      <!-- Channel selector -->
      <div class="ch-row">
        <label class="ch-label ch1"><input type="checkbox" id="ch1-toggle" checked><span class="ch-dot" style="background:#008184"></span>CH1</label>
        <label class="ch-label"><input type="checkbox" id="points-toggle">POINTS</label>
        <label class="ch-label"><input type="checkbox" id="log-scale-toggle">LOG Y</label>
      </div>

      <!-- Chart -->
      <div class="chart-wrapper">
        <canvas id="plot"></canvas>
        <canvas id="grid-overlay"></canvas>
      </div>

      <!-- Controls -->
      <div class="ctrl-bar">
        <div class="ctrl-grp">
          <span class="lbl">Y SCALE</span>
          <button class="btn" id="y-zoom-in">＋</button>
          <button class="btn" id="y-zoom-out">－</button>
        </div>
      </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="col-right">
      <div class="right-section">
        <span class="sec-title">SIGNAL INFO</span>
        <div class="sig-row">
          <span class="lbl">FREQ</span>
          <span class="sig-val" id="info-freq">—</span>
        </div>
      </div>
    </div>

  </div>

</div>
</body>
</html>
